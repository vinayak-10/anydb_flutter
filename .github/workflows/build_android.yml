name: 🤖 Android Release Build

on:
  # push:
  #   branches: [ master ]
  workflow_dispatch: # Allows manual run triggering from the GitHub Actions UI

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🔑 Inject Secrets
        run: |
          # Reconstructs compile-time secrets.json from GitHub secrets
          echo '${{ secrets.SECRETS_JSON }}' > secrets.json

      - name: 📝 Configure Android Signing Key
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASS_SECRET: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS_SECRET: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS_SECRET: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          # Define defaults matching the standard setup
          DEFAULT_PASS="and_any"
          DEFAULT_ALIAS="anydb-alias"

          STORE_PASS="${STORE_PASS_SECRET:-$DEFAULT_PASS}"
          KEY_PASS="${KEY_PASS_SECRET:-$DEFAULT_PASS}"
          KEY_ALIAS="${KEY_ALIAS_SECRET:-$DEFAULT_ALIAS}"

          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Signing Key: Custom keystore secret detected. Decoding..."
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          else
            echo "Signing Key: No custom keystore secret found. Generating temporary dummy keystore..."
            keytool -genkey -v -keystore android/app/upload-keystore.jks \
              -alias "$KEY_ALIAS" -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$STORE_PASS" -keypass "$KEY_PASS" \
              -dname "CN=AnyDb, OU=Development, O=AnyDb, L=Unknown, S=Unknown, C=US"
          fi

          # Write key.properties
          echo "storePassword=$STORE_PASS" > android/key.properties
          echo "keyPassword=$KEY_PASS" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

          echo "Signing Key: Configuration successfully generated in android/key.properties"

      - name: 📦 Fetch Packages
        run: flutter pub get

      - name: ⚙️ Build Android APK
        run: |
          flutter build apk --release --dart-define-from-file=secrets.json

      - name: ⚙️ Build Android App Bundle (AAB)
        run: |
          flutter build appbundle --release --dart-define-from-file=secrets.json

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: anydb-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 5

      - name: 📤 Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: anydb-android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 5
