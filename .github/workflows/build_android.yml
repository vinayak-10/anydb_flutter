name: 🤖 Android Release Build

on:
  push:
    branches: [ master ]
  workflow_dispatch: # Allows manual run triggering from the GitHub Actions UI

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🔑 Inject Secrets
        run: |
          SECRET_CONTENT='${{ secrets.SECRETS_JSON }}'
          if [ -z "$SECRET_CONTENT" ] || [ "$SECRET_CONTENT" = "null" ]; then
            echo "Signing Secrets: No custom SECRETS_JSON secret detected. Injecting template..."
            echo '{"GOOGLE_CLIENT_SECRET": "your-secret-here"}' > secrets.json
          else
            echo "$SECRET_CONTENT" > secrets.json
          fi

      - name: 🔑 Inject Firebase Config (google-services.json)
        env:
          GOOGLE_SERVICES_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_BASE64" ]; then
            echo "Firebase Config: Decoding google-services.json..."
            echo "$GOOGLE_SERVICES_BASE64" | base64 --decode > android/app/google-services.json
          else
            echo "Firebase Config: Warning! No GOOGLE_SERVICES_JSON_BASE64 secret found."
          fi

      - name: 📝 Configure Android Signing Key
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASS_SECRET: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS_SECRET: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS_SECRET: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          DEFAULT_PASS="and_any"
          DEFAULT_ALIAS="anydb-alias"

          STORE_PASS="${STORE_PASS_SECRET:-$DEFAULT_PASS}"
          KEY_PASS="${KEY_PASS_SECRET:-$DEFAULT_PASS}"
          KEY_ALIAS="${KEY_ALIAS_SECRET:-$DEFAULT_ALIAS}"

          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Signing Key: Custom keystore secret detected. Decoding..."
            # Save directly into the app module directory
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          else
            echo "Signing Key: No custom keystore secret found. Generating temporary dummy keystore..."
            keytool -genkey -v -keystore android/app/upload-keystore.jks \
              -alias "$KEY_ALIAS" -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$STORE_PASS" -keypass "$KEY_PASS" \
              -dname "CN=AnyDb, OU=Development, O=AnyDb, L=Unknown, S=Unknown, C=US"
          fi

          # Write key.properties into the directory build.gradle.kts targets
          echo "storePassword=$STORE_PASS" > android/key.properties
          echo "keyPassword=$KEY_PASS" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          
          # Fixed path alignment for the Gradle app-level context
          echo "storeFile=upload-keystore.jks" >> android/key.properties

          echo "Signing Key: Configuration successfully generated in android/key.properties"

      - name: 📦 Fetch Packages
        run: flutter pub get

      - name: ⚙️ Build Android APK
        run: |
          flutter build apk --release --dart-define-from-file=secrets.json

      # CRITICAL FIX STEP: Move and isolate the clean APK binary before the App Bundle build alters the build cache directory
      - name: 🛡️ Secure and Isolate APK Output
        run: |
          mkdir -p final_apk_output/
          cp build/app/outputs/flutter-apk/app-release.apk final_apk_output/anydb-release-build-${{ github.run_number }}.apk
          echo "✅ Clean APK successfully secured outside the build cache workspace."

      - name: 🧹 Clean Cache Between Builds
        run: flutter clean && flutter pub get

      - name: ⚙️ Build Android App Bundle (AAB)
        run: |
          flutter build appbundle --release --dart-define-from-file=secrets.json

      - name: ⚙️ Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: 📝 Configure rclone
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONF" > ~/.config/rclone/rclone.conf

      # CRITICAL FIX STEP: Upload the APK from our isolated storage layer instead of the corrupted intermediate folder
      - name: 📤 Upload APK to Google Drive
        run: |
          rclone copy -P final_apk_output/anydb-release-build-${{ github.run_number }}.apk "gdrive:RKM Indore App/apks/flutter_apk/" --drive-shared-with-me

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: anydb-android-apk-build-${{ github.run_number }}
          path: final_apk_output/anydb-release-build-${{ github.run_number }}.apk
          retention-days: 5

      - name: 📤 Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: anydb-android-aab-build-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 5

      - name: 🧹 Shred and Clean Signing Assets
        if: always()
        run: |
          # Securely purge generated files from the runner storage instance
          rm -f android/app/upload-keystore.jks
          rm -f android/key.properties
          rm -f secrets.json
          rm -f android/app/google-services.json
