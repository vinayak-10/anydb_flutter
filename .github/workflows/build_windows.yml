name: 💻 Windows Release Build

on:
  push:
    branches: [ main, dev ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🔑 Inject Secrets
        shell: pwsh
        run: |
          # Reconstructs compile-time secrets.json from GitHub secrets
          @"
          ${{ secrets.SECRETS_JSON }}
          "@ > secrets.json

      - name: 📦 Fetch Packages
        run: flutter pub get

      - name: ⚙️ Build Windows Application
        run: |
          flutter build windows --release --dart-define-from-file=secrets.json

      - name: 📦 Zip Windows Build Artifacts
        shell: pwsh
        run: |
          # Packages the exe, dll dependencies, and data assets preserving their structure
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath anydb_windows.zip

      - name: 📤 Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: anydb-windows-release
          path: anydb_windows.zip
          retention-days: 5
