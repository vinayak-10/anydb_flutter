<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background: Warm Saffron Sandstone -->
  <rect width="512" height="512" rx="64" fill="#E5C396"/>
  
  <!-- Yantra Sacred Geometry / Isometric Database Cube -->
  <g transform="translate(0, 10)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    
    <!-- Outer Gate (Bhupura) in Cocoa Bronze -->
    <rect x="96" y="86" width="320" height="320" rx="16" stroke="#3E2C1E" stroke-width="4"/>
    <rect x="112" y="102" width="288" height="288" rx="8" stroke="#3E2C1E" stroke-width="2" stroke-dasharray="6 4"/>
    
    <!-- Concentric Circles -->
    <circle cx="256" cy="246" r="115" stroke="#3E2C1E" stroke-width="3"/>
    
    <!-- Isometric Yantra Cube Grid -->
    <!-- Cube Outer Frame -->
    <polygon points="256,131 356,189 356,303 256,361 156,303 156,189" stroke="#3E2C1E" stroke-width="4"/>
    
    <!-- Inner Isometric Axes -->
    <line x1="256" y1="246" x2="256" y2="131" stroke="#3E2C1E" stroke-width="3"/>
    <line x1="256" y1="246" x2="356" y2="189" stroke="#3E2C1E" stroke-width="3"/>
    <line x1="256" y1="246" x2="156" y2="189" stroke="#3E2C1E" stroke-width="3"/>
    <line x1="256" y1="246" x2="256" y2="361" stroke="#3E2C1E" stroke-width="3"/>
    <line x1="256" y1="246" x2="356" y2="303" stroke="#3E2C1E" stroke-width="3"/>
    <line x1="256" y1="246" x2="156" y2="303" stroke="#3E2C1E" stroke-width="3"/>
    
    <!-- Interconnected Yantra Triangles in Cocoa Bronze -->
    <polygon points="256,131 356,303 156,303" stroke="#3E2C1E" stroke-width="2"/>
    <polygon points="256,361 356,189 156,189" stroke="#3E2C1E" stroke-width="2"/>
    
    <!-- Intersecting Data Nodes (Luminous Mint Green) -->
    <circle cx="256" cy="131" r="9" fill="#48CFCB" stroke="#3E2C1E" stroke-width="2"/>
    <circle cx="256" cy="361" r="9" fill="#48CFCB" stroke="#3E2C1E" stroke-width="2"/>
    <circle cx="356" cy="189" r="9" fill="#48CFCB" stroke="#3E2C1E" stroke-width="2"/>
    <circle cx="156" cy="189" r="9" fill="#48CFCB" stroke="#3E2C1E" stroke-width="2"/>
    <circle cx="356" cy="303" r="9" fill="#48CFCB" stroke="#3E2C1E" stroke-width="2"/>
    <circle cx="156" cy="303" r="9" fill="#48CFCB" stroke="#3E2C1E" stroke-width="2"/>
    
    <circle cx="256" cy="246" r="11" fill="#FFFFFF" stroke="#3E2C1E" stroke-width="3"/>
  </g>
  
  <!-- Typography: Pure Cocoa Bronze text "anydb" -->
  <text x="256" y="455" text-anchor="middle" font-family="'Inter', sans-serif" font-size="32" font-weight="bold" fill="#3E2C1E" letter-spacing="6">ANYDB</text>
</svg>
