<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background: Deep Royal Navy -->
  <rect width="512" height="512" rx="64" fill="#0C1B2B"/>
  
  <!-- Dharmachakra / Dynamic Report Engine -->
  <g transform="translate(0, 10)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    
    <!-- Outer Wheel Rim (Warm Cream & Royal Bronze) -->
    <circle cx="256" cy="246" r="140" stroke="#D3A25D" stroke-width="6"/>
    <circle cx="256" cy="246" r="122" stroke="#F9F6EE" stroke-width="2" stroke-dasharray="4 4"/>
    
    <!-- 8 Rim Tethers (Spoke Tips) -->
    <circle cx="256" cy="106" r="6" fill="#F9F6EE" stroke="none"/>
    <circle cx="256" cy="386" r="6" fill="#F9F6EE" stroke="none"/>
    <circle cx="116" cy="246" r="6" fill="#F9F6EE" stroke="none"/>
    <circle cx="396" cy="246" r="6" fill="#F9F6EE" stroke="none"/>
    <circle cx="157" cy="147" r="5" fill="#D3A25D" stroke="none"/>
    <circle cx="355" cy="345" r="5" fill="#D3A25D" stroke="none"/>
    <circle cx="157" cy="345" r="5" fill="#D3A25D" stroke="none"/>
    <circle cx="355" cy="147" r="5" fill="#D3A25D" stroke="none"/>
    
    <!-- 8 Spokes styled as Sleek Vertical Reporting Grid Columns -->
    <!-- Up, Down, Left, Right -->
    <line x1="256" y1="186" x2="256" y2="106" stroke="#F9F6EE" stroke-width="8"/>
    <line x1="256" y1="306" x2="256" y2="386" stroke="#F9F6EE" stroke-width="8"/>
    <line x1="176" y1="246" x2="116" y2="246" stroke="#F9F6EE" stroke-width="8"/>
    <line x1="336" y1="246" x2="396" y2="246" stroke="#F9F6EE" stroke-width="8"/>
    
    <!-- Diagonal reporting columns -->
    <line x1="200" y1="190" x2="157" y2="147" stroke="#D3A25D" stroke-width="6"/>
    <line x1="312" y1="302" x2="355" y2="345" stroke="#D3A25D" stroke-width="6"/>
    <line x1="200" y1="302" x2="157" y2="345" stroke="#D3A25D" stroke-width="6"/>
    <line x1="312" y1="190" x2="355" y2="147" stroke="#D3A25D" stroke-width="6"/>
    
    <!-- Central Database Cylinder Hub -->
    <path d="M 226,220 C 241,220 286,224 286,230 C 286,236 241,240 226,240 C 211,240 196,236 196,230 C 196,224 211,220 226,220 Z" fill="#D3A25D" fill-opacity="0.2" stroke="#D3A25D" stroke-width="3"/>
    <path d="M 196,230 L 196,262 C 196,268 211,272 226,272 C 241,272 286,268 286,262 L 286,230" stroke="#D3A25D" stroke-width="3"/>
    <path d="M 196,246 Q 226,256 286,246" stroke="#D3A25D" stroke-width="2"/>
    <path d="M 196,262 Q 226,272 286,262" stroke="#D3A25D" stroke-width="2"/>
    
  </g>
  
  <!-- Typography: Pure Warm Cream text "anydb" -->
  <text x="256" y="450" text-anchor="middle" font-family="'Lora', 'Playfair Display', serif" font-size="36" font-weight="bold" fill="#F9F6EE" letter-spacing="6">anydb</text>
</svg>
