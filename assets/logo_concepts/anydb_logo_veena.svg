<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background: Rich Terracotta -->
  <rect width="512" height="512" rx="64" fill="#C24D2C"/>
  
  <!-- Saraswati Veena / Observer Resonance Strings -->
  <g transform="translate(0, 10)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    
    <!-- Veena continuous line tracing (Soft Sandstone Brown) -->
    <!-- Large Gourd resonator (Bottom Left) -->
    <circle cx="180" cy="266" r="60" stroke="#8C6239" stroke-width="8"/>
    <circle cx="180" cy="266" r="50" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="4 4"/>
    
    <!-- Small neck resonator gourd (Top Right) -->
    <circle cx="340" cy="146" r="30" stroke="#8C6239" stroke-width="6"/>
    
    <!-- Neck / Fretboard (Dandi) -->
    <line x1="140" y1="296" x2="370" y2="120" stroke="#8C6239" stroke-width="12"/>
    
    <!-- Tuning Pegs (Modern Fret pins representing data parameters) -->
    <line x1="360" y1="110" x2="380" y2="125" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="370" y1="100" x2="390" y2="115" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="380" y1="90" x2="400" y2="105" stroke="#FFFFFF" stroke-width="4"/>
    
    <!-- Veena Head (Yali dragon neck) styled as database cylinder curve -->
    <path d="M 370,120 Q 400,100 410,130 Q 400,150 370,140" stroke="#8C6239" stroke-width="8"/>
    
    <!-- 4 Resonant Observer Strings (Crisp White) -->
    <!-- These strings represent live database observers vibrating reactively -->
    <line x1="150" y1="290" x2="360" y2="128" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="156" y1="282" x2="366" y2="120" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="162" y1="274" x2="372" y2="112" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="168" y1="266" x2="378" y2="104" stroke="#FFFFFF" stroke-width="1"/>
    
    <!-- Sound Hole (Lotus geometry at bridge center) -->
    <circle cx="180" cy="266" r="14" fill="#FFFFFF" stroke="#8C6239" stroke-width="2"/>
  </g>
  
  <!-- Typography: Pure White text "anydb" -->
  <text x="256" y="450" text-anchor="middle" font-family="'Lora', 'Playfair Display', serif" font-size="38" font-weight="bold" fill="#FFFFFF" letter-spacing="4">anydb</text>
</svg>
