<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background: Sandstone Terracotta Clay -->
  <rect width="512" height="512" rx="64" fill="#D65A31"/>
  
  <!-- Devanagari Sanskrit "अ" + Database Cylinder Fusion -->
  <g transform="translate(112, 90)" stroke="#F5ECCB" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Shirorekha (Top Horizontal Bar) styled as dynamic server rack edge -->
    <line x1="20" y1="20" x2="260" y2="20" />
    <circle cx="240" cy="20" r="4" fill="#F5ECCB" stroke="none"/>
    
    <!-- Devanagari Curve Left "अ" curves -->
    <path d="M 90,20 A 55,55 0 0,0 90,130 A 60,60 0 0,0 100,250" />
    <!-- Center connecting bar -->
    <line x1="90" y1="130" x2="180" y2="130" />
    
    <!-- Vertical Spine and Right Database Cylinder Fusion -->
    <line x1="180" y1="20" x2="180" y2="250" />
    
    <!-- 3-Tier Database Cylinder stack merged with right letter strokes -->
    <!-- Cylinder 1 (Top) -->
    <path d="M 180,50 C 210,50 250,58 250,70 C 250,82 210,90 180,90 C 150,90 110,82 110,70 C 110,58 150,50 180,50 Z" />
    <path d="M 110,70 L 110,95 C 110,107 150,115 180,115 C 210,115 250,107 250,95 L 250,70" />
    
    <!-- Cylinder 2 (Middle) -->
    <path d="M 110,130 L 110,155 C 110,167 150,175 180,175 C 210,175 250,167 250,155 L 250,130" />
    
    <!-- Cylinder 3 (Bottom) -->
    <path d="M 110,190 L 110,215 C 110,227 150,235 180,235 C 210,235 250,227 250,215 L 250,190" />
  </g>
  
  <!-- Typography: Classical Serif text "anydb" -->
  <text x="256" y="450" text-anchor="middle" font-family="'Lora', 'Playfair Display', serif" font-size="42" font-weight="bold" fill="#F5ECCB" letter-spacing="4">anydb</text>
</svg>
